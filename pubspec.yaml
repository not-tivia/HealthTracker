name: health_tracker
description: A comprehensive health and fitness tracking app.
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  flutter_foreground_task: ^8.0.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  
  # Health & Fitness - Using pedometer instead of health package
  pedometer: ^4.0.1
  permission_handler: ^11.3.0
  
  # UI Components
  percent_indicator: ^4.2.3
  fl_chart: ^0.66.2
  
  # Image handling
  image_picker: ^1.0.7
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  path_provider: ^2.1.2
  url_launcher: ^6.2.4
  
  # Import/Export
  file_picker: ^8.0.0
  share_plus: ^10.0.0
  
  # Notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  
  # Audio for rest timer
  audioplayers: ^5.2.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  
  assets:
    - assets/sounds/
